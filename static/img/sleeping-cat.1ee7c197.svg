  <defs>
    <style>
      @keyframes tail-swing {
        0% {
          transform: rotate(0deg);
        }
        50% {
          transform: rotate(10deg); /* Controls the maximum swing angle to one side */
        }
        100% {
          transform: rotate(-5deg); /* Controls the maximum swing angle to the other side */
        }
      }

      #cat-tail {
        animation: tail-swing 4s ease-in-out infinite alternate;
        /* Pivot point for the swing - taken from the start of your tail path */
        transform-origin: 88.64px 27.23px;
      }
    </style>
